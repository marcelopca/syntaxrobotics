<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Syntax Robotics</title>
    <meta name="description" content="Automation that pays for itself from day one." />
    <meta name="theme-color" content="#078244" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        overflow: hidden;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: #078244;
        color: #fff;
      }

      .page {
        position: relative;
        height: 100vh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Repeating S-mark background pattern */
      .page::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: url('assets/syntax_2.png');
        background-repeat: repeat;
        background-size: 110px;
        mix-blend-mode: multiply;
        opacity: 0.18;
        z-index: 0;
        pointer-events: none;
      }

      /* Hero layout: left text | robot | right text */
      .hero {
        position: relative;
        z-index: 1;
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1.5fr 1fr;
        align-items: center;
        padding: 3rem 5%;
        gap: 1.5rem;
      }

      .headline {
        font-size: clamp(1.3rem, 2.2vw, 2.1rem);
        font-weight: 800;
        line-height: 1.17;
        letter-spacing: -0.025em;
      }

      .headline--right {
        text-align: right;
      }

      .robot-wrap {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1.5rem;
      }

      .robot-img {
        width: 100%;
        max-width: 700px;
        height: auto;
        display: block;
        filter: drop-shadow(0 24px 56px rgba(0, 0, 0, 0.28));
      }

      /* Footer bar */
      .footer {
        position: relative;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1.75rem;
        margin: 0 1.5rem 1.5rem;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.32);
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12),
                    inset 0 1px 0 rgba(255, 255, 255, 0.4);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none;
      }

      .brand__logo {
        height: 2rem;
        filter: invert(1);
        mix-blend-mode: screen;
      }

      .login-form {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .login-input {
        padding: 0.65rem 1rem;
        border: 2px solid rgba(255, 255, 255, 0.6);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.15);
        color: #fff;
        font-family: inherit;
        font-size: 0.9375rem;
        outline: none;
        transition: border-color 0.16s ease, background 0.16s ease;
        width: 10rem;
      }

      .login-input::placeholder {
        color: rgba(255, 255, 255, 0.55);
      }

      .login-input:focus {
        border-color: #fff;
        background: rgba(0, 0, 0, 0.22);
      }

      .login-btn {
        display: inline-flex;
        align-items: center;
        padding: 0.65rem 1.75rem;
        border: 2px solid rgba(255, 255, 255, 0.6);
        border-radius: 6px;
        background: transparent;
        color: #fff;
        font-family: inherit;
        font-size: 0.9375rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: background 0.16s ease, border-color 0.16s ease;
      }

      .login-btn:hover,
      .login-btn:focus-visible {
        background: rgba(255, 255, 255, 0.12);
        border-color: #fff;
        outline: none;
      }

      .auth-error {
        display: none;
        align-items: center;
        padding: 0.35rem 1rem;
        margin-top: 0.5rem;
        background: rgba(255, 255, 255, 0.13);
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 9999px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1),
                    inset 0 1px 0 rgba(255, 255, 255, 0.35);
        color: #fff;
        font-size: 0.8125rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        opacity: 0;
        transform: translateY(-4px);
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .auth-error.visible {
        display: inline-flex;
      }

      .auth-error.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* ── Responsive ─────────────────────────────── */
      @media (max-width: 760px) {
        html, body {
          overflow: auto;
        }

        .page {
          height: auto;
          min-height: 100svh;
        }

        .hero {
          grid-template-columns: 1fr;
          text-align: center;
          padding: 3rem 1.5rem 1.5rem;
          gap: 1.75rem;
        }

        .headline--right {
          text-align: center;
          order: 3;
        }

        .robot-wrap {
          order: 2;
        }

        .robot-img {
          max-width: 90vw;
        }

        .footer {
          margin: 0 0.75rem 0.75rem;
          padding: 0.65rem 1.25rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">

      <main class="hero">
        <p class="headline">Automation that pays<br>for itself</p>

        <div class="robot-wrap">
          <picture>
            <source srcset="assets/double_palletizer.webp" type="image/webp" />
            <img
              class="robot-img"
              src="assets/double_palletizer.png"
              alt="Syntax Robotic Palletizer"
            />
          </picture>
          <form class="login-form" onsubmit="handleLogin(event);">
            <input
              class="login-input"
              type="text"
              name="username"
              placeholder="Username"
              autocomplete="username"
            />
            <button class="login-btn" type="submit">Login</button>
          </form>
          <div class="auth-error" id="auth-error">User not authorized</div>
        </div>

        <p class="headline headline--right">from day one.</p>
      </main>

      <footer class="footer">
        <a class="brand" href="#" aria-label="Syntax Robotics home">
          <img class="brand__logo" src="assets/syntax_1.png" alt="Syntax Robotics" />
        </a>
      </footer>

    </div>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const input = document.querySelector('.login-input');
      const error = document.getElementById('auth-error');
      if (!input.value.trim()) return;
      error.classList.add('visible');
      requestAnimationFrame(() => error.classList.add('show'));
    }

    document.querySelector('.login-input').addEventListener('input', function () {
      const error = document.getElementById('auth-error');
      if (error.classList.contains('show')) {
        error.classList.remove('show');
        setTimeout(() => error.classList.remove('visible'), 200);
      }
    });
  </script>
  </body>
</html>
